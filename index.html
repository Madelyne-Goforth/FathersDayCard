<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Father's Day Card</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="working.js" defer></script>
</head>
<body>
  <div class="card" id="card">
    <div class="card-front">
      <div class="card-front-image"></div>
    </div>

    <div class="card-inside-L">
      <div class="card-inside-L-photo"></div>
    </div>

    <div class="card-inside-R">
      <h3 class="card-inside-title">Happy Father's Day!</h3>
      <p class="card-inside-content-L1">Thanks for everything that you do and for always being there; means a lot to me.</p>
      <p class="card-inside-content-L2">Love you, Dad!</p>
    </div>
  </div>
</body>
</html>
